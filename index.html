<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CondoCheck V2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a2c35; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* TELAS */
        .screen { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none; position: relative; }
        .active { display: block; }

        /* ELEMENTOS */
        h2, h3 { text-align: center; color: #1a2c35; margin-top: 0; }
        .header-title { border-bottom: 2px solid #00d2b4; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        .btn-main { width: 100%; padding: 15px; background: #1a2c35; color: #00d2b4; border: none; font-weight: bold; font-size: 16px; margin-top: 20px; border-radius: 8px; cursor: pointer; }
        .btn-main:active { opacity: 0.9; }
        .btn-main:disabled { background: #555; cursor: not-allowed; }
        
        /* STATUS */
        .error { color: red; text-align: center; margin-top: 10px; font-weight: bold; }
        
        /* PROGRESS BAR */
        .progress-container { width: 100%; background-color: #ddd; border-radius: 8px; margin-top: 15px; overflow: hidden; height: 10px; }
        .progress-bar { height: 10px; background-color: #00d2b4; width: 0%; transition: width 0.3s; }
        
        /* V2 CARDS */
        .task-card { background: #f0f8f7; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid #00d2b4; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .task-title { font-size: 16px; color: #333; font-weight: bold; margin-bottom: 15px; line-height: 1.3; }
        .btn-group { display: flex; gap: 10px; }
        .btn-executar { flex: 1; padding: 12px; background: #00d2b4; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-executar:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-justificar { flex: 1; padding: 12px; background: #ff9800; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-justificar:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* BOXES - Execução e Justificativa */
        .execucao-box, .justificativa-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; display: none; }
        .execucao-box.open, .justificativa-box.open { display: block; }
        
        .btn-send-exec { width: 100%; padding: 12px; background: #00d2b4; color: white; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-send-exec:disabled { background: #555; cursor: not-allowed; }
        
        .btn-send-just { width: 100%; padding: 12px; background: #1a2c35; color: white; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-send-just:disabled { background: #555; cursor: not-allowed; }
        
        .task-done { background: #e8f5e9; border-left-color: #4caf50; opacity: 0.7; pointer-events: none; }
        .task-done .btn-group { display: none; }
        .task-done-msg { color: #4caf50; font-weight: bold; font-size: 14px; text-align: center; display: block; margin-top: 10px; }

        /* FAB E MODAL */
        .fab-btn { position: fixed; bottom: 30px; right: 30px; background: #00d2b4; color: #1a2c35; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; cursor: pointer; z-index: 1000; font-weight: bold; }
        .fab-btn:active { transform: scale(0.95); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 28px; cursor: pointer; color: #555; line-height: 1; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="screenLogin" class="screen active">
        <div class="header-title">
            <h3>Acesso Restrito - V2</h3>
        </div>
        
        <label>Usuário:</label>
        <input type="text" id="loginUser" placeholder="Ex: maria">
        
        <label>Senha:</label>
        <input type="password" id="loginPass" placeholder="****">

        <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
        <p id="msgLogin" class="error"></p>
    </div>

    <!-- TELA DE TAREFAS -->
    <div id="screenChecklist" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3 style="margin:0; color:#1a2c35">MINHAS TAREFAS</h3>
            <small onclick="sair()" style="color:red; cursor:pointer; font-weight:bold;">Sair</small>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0">

        <div style="background:#e9ecef; padding:10px; border-radius:6px; margin-bottom:15px; text-align:center;">
            <span style="color:#555; font-weight:bold" id="userNameDisplay"></span><br>
            <span style="color:#888; font-size:14px" id="dateDisplay"></span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="progressText" style="text-align:center; font-size:14px; margin-top:5px; color:#555; font-weight:bold;"></p>

        <div id="tasksContainer">
            <!-- Cards de tarefas serão inseridos aqui -->
        </div>

        <p id="statusMsg" style="text-align:center; margin-top:15px; font-weight:bold; color: #00d2b4;"></p>
        
        <!-- FAB OCORRÊNCIAS -->
        <button class="fab-btn" onclick="abrirModalOcorrencia()">🔧</button>
    </div>

    <!-- MODAL OCORRENCIA -->
    <div id="modalOcorrencia" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModalOcorrencia()">&times;</span>
            <h3 style="margin-top:0; color:#1a2c35; border-bottom: 2px solid #00d2b4; padding-bottom: 10px;">Registrar Ocorrência Extra</h3>
            
            <label>Categoria:</label>
            <select id="ocorrenciaCategoria">
                <option value="">Selecione...</option>
                <option value="Elétrica">Elétrica</option>
                <option value="Hidráulica">Hidráulica</option>
                <option value="Alvenaria">Alvenaria</option>
                <option value="Outros">Outros</option>
            </select>

            <label>Descrição:</label>
            <textarea id="ocorrenciaDescricao" rows="3" placeholder="Detalhes do problema..."></textarea>

            <label>Foto do Local (Obrigatória):</label>
            <input type="file" id="ocorrenciaFoto" accept="image/*" capture="environment" style="background: white;">

            <button class="btn-main" id="btnSendOcorrencia" onclick="enviarOcorrencia()">ENVIAR REGISTRO</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://tkychwsoxinzcwzuuaas.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRreWNod3NveGluemN3enV1YWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDk4NjEsImV4cCI6MjA3ODc4NTg2MX0.4mq4_jcSyAhRybjhIMaWPjS8YIDMkgX9nF3JvQ-dUNg';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let loggedUser = null;
        let diaAtual = '';
        let totalTarefas = 0;
        let tarefasConcluidas = 0;

        // Descobre o dia da semana atual
        const diasSemana = ['domingo', 'segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado'];
        const hoje = new Date();
        diaAtual = diasSemana[hoje.getDay()];

        function init() {
            const savedUserId = localStorage.getItem('condocheck_v2_user_id');
            const savedUserName = localStorage.getItem('condocheck_v2_user_name');
            if (savedUserId && savedUserName) {
                loggedUser = { id: savedUserId, nome: savedUserName };
                mostrarTelaTarefas();
            }
        }
        init();

        // --- LÓGICA DE LOGIN ---
        async function fazerLogin() {
            const login = document.getElementById('loginUser').value.toLowerCase().trim();
            const senha = document.getElementById('loginPass').value.trim();
            const msg = document.getElementById('msgLogin');

            if(!login || !senha) { msg.innerText = "Preencha tudo."; return; }

            msg.innerText = "Verificando...";

            const { data, error } = await sb
                .from('funcionarios_v2')
                .select('*')
                .eq('login', login)
                .eq('senha', senha)
                .single();

            if(error || !data) {
                msg.innerText = "Usuário ou senha incorretos.";
            } else {
                msg.innerText = "";
                loggedUser = data;
                localStorage.setItem('condocheck_v2_user_id', data.id);
                localStorage.setItem('condocheck_v2_user_name', data.nome);
                
                mostrarTelaTarefas();
            }
        }

        function sair() {
            localStorage.removeItem('condocheck_v2_user_id');
            localStorage.removeItem('condocheck_v2_user_name');
            location.reload();
        }

        function mostrarTelaTarefas() {
            document.getElementById('screenLogin').classList.remove('active');
            document.getElementById('screenChecklist').classList.add('active');
            
            document.getElementById('userNameDisplay').innerText = `Olá, ${loggedUser.nome}`;
            document.getElementById('dateDisplay').innerText = `Tarefas de Hoje (${diaAtual.charAt(0).toUpperCase() + diaAtual.slice(1)})`;
            
            carregarTarefas();
        }

        function atualizarProgresso() {
            const progressText = document.getElementById('progressText');
            const progressBar = document.getElementById('progressBar');
            
            if(totalTarefas === 0) {
                progressText.innerText = '';
                progressBar.style.width = '0%';
                return;
            }
            
            const perc = (tarefasConcluidas / totalTarefas) * 100;
            progressBar.style.width = `${perc}%`;
            progressText.innerText = `${tarefasConcluidas} de ${totalTarefas} Tarefas Concluídas`;
        }

        // --- CARREGAR TAREFAS ---
        async function carregarTarefas() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = '<p style="text-align:center;">Carregando tarefas...</p>';
            totalTarefas = 0;
            tarefasConcluidas = 0;
            atualizarProgresso();

            if(diaAtual === 'domingo') {
                container.innerHTML = '<p style="text-align:center; color:#555;">Nenhuma tarefa programada para domingo.</p>';
                return;
            }

            const { data: tarefas, error: errTarefas } = await sb
                .from('matriz_tarefas_v2')
                .select('*')
                .eq('funcionario_id', loggedUser.id)
                .eq(diaAtual, true);

            if(errTarefas || !tarefas || tarefas.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#555;">Nenhuma tarefa programada para você hoje.</p>';
                return;
            }

            const dataHoje = new Date().toISOString().split('T')[0];
            const { data: execucoes, error: errExec } = await sb
                .from('diario_execucoes_v2')
                .select('tarefa_id, status')
                .eq('funcionario_id', loggedUser.id)
                .eq('data_execucao', dataHoje);

            const tarefasFeitas = {};
            if(execucoes) {
                execucoes.forEach(e => tarefasFeitas[e.tarefa_id] = e.status);
            }

            container.innerHTML = '';
            totalTarefas = tarefas.length;
            
            tarefas.forEach(t => {
                const jaFeito = tarefasFeitas[t.id];
                if(jaFeito) tarefasConcluidas++;

                const card = document.createElement('div');
                card.className = jaFeito ? 'task-card task-done' : 'task-card';
                card.id = `card_${t.id}`;

                let botoesHTML = '';
                let statusHTML = '';

                if (jaFeito) {
                    statusHTML = `<span class="task-done-msg">✅ ${jaFeito}</span>`;
                } else {
                    let optionChuva = t.justificavel_por_chuva ? `<option value="Chuva">Chuva</option>` : '';
                    botoesHTML = `
                        <div class="btn-group">
                            <button class="btn-executar" id="btnToggleExec_${t.id}" onclick="toggleExecucao('${t.id}')">EXECUTAR</button>
                            <button class="btn-justificar" id="btnToggleJust_${t.id}" onclick="toggleJustificativa('${t.id}')">JUSTIFICAR</button>
                        </div>
                        
                        <!-- CAIXA DE EXECUÇÃO -->
                        <div id="execBox_${t.id}" class="execucao-box">
                            <label style="margin-top:0">Observações (Opcional):</label>
                            <textarea id="obsExec_${t.id}" rows="2" placeholder="Detalhes da execução..."></textarea>
                            
                            <label>Foto da Prova (Obrigatória):</label>
                            <input type="file" id="fotoExec_${t.id}" accept="image/*" capture="environment" style="background: white;">
                            
                            <button class="btn-send-exec" id="btnSendExec_${t.id}" onclick="enviarExecucao('${t.id}')">ENVIAR PROVA E CONCLUIR</button>
                        </div>

                        <!-- CAIXA DE JUSTIFICATIVA -->
                        <div id="justBox_${t.id}" class="justificativa-box">
                            <label style="margin-top:0">Motivo:</label>
                            <select id="motivo_${t.id}">
                                <option value="">Selecione...</option>
                                ${optionChuva}
                                <option value="Falta de Material">Falta de Material</option>
                                <option value="Falta de Tempo">Falta de Tempo</option>
                                <option value="Equipamento Quebrado">Equipamento Quebrado</option>
                                <option value="Outros">Outros</option>
                            </select>
                            
                            <label>Foto da Prova (Obrigatória):</label>
                            <input type="file" id="foto_${t.id}" accept="image/*" capture="environment" style="background: white;">
                            
                            <button class="btn-send-just" id="btnSendJust_${t.id}" onclick="enviarJustificativa('${t.id}')">ENVIAR JUSTIFICATIVA</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="task-title">${t.descricao_tarefa}</div>
                    ${statusHTML}
                    ${botoesHTML}
                `;
                container.appendChild(card);
            });

            atualizarProgresso();
        }

        // --- AÇÕES ---
        function toggleExecucao(tarefaId) {
            const boxExec = document.getElementById(`execBox_${tarefaId}`);
            const boxJust = document.getElementById(`justBox_${tarefaId}`);
            if(boxJust.classList.contains('open')) boxJust.classList.remove('open');
            boxExec.classList.toggle('open');
        }

        function toggleJustificativa(tarefaId) {
            const boxJust = document.getElementById(`justBox_${tarefaId}`);
            const boxExec = document.getElementById(`execBox_${tarefaId}`);
            if(boxExec.classList.contains('open')) boxExec.classList.remove('open');
            boxJust.classList.toggle('open');
        }

        async function enviarExecucao(tarefaId) {
            const obs = document.getElementById(`obsExec_${tarefaId}`).value.trim();
            const fileInput = document.getElementById(`fotoExec_${tarefaId}`);
            const file = fileInput.files[0];

            if(!file) { alert("A foto é obrigatória para concluir a tarefa!"); return; }

            const btnSend = document.getElementById(`btnSendExec_${tarefaId}`);
            btnSend.disabled = true;
            btnSend.innerText = "⏳ ENVIANDO FOTO...";

            try {
                const nomeArq = 'execucao_' + Date.now() + '_' + Math.floor(Math.random()*1000) + '.jpg';
                const { error: errUp } = await sb.storage.from('PROVAS').upload(nomeArq, file);
                if(errUp) throw errUp;

                const { data: urlData } = sb.storage.from('PROVAS').getPublicUrl(nomeArq);
                const fotoUrl = urlData.publicUrl;

                btnSend.innerText = "💾 SALVANDO...";
                const dataHoje = new Date().toISOString().split('T')[0];

                const { error: errDb } = await sb.from('diario_execucoes_v2').insert({
                    tarefa_id: tarefaId,
                    funcionario_id: loggedUser.id,
                    data_execucao: dataHoje,
                    status: 'CONCLUIDO',
                    observacao: obs,
                    foto_url: fotoUrl
                });

                if(errDb) throw errDb;

                marcaCardComoConcluido(tarefaId, 'CONCLUIDO');
                mostrarStatus('Tarefa executada com sucesso!');
                tarefasConcluidas++;
                atualizarProgresso();

            } catch(e) {
                alert("Erro: " + e.message);
                btnSend.disabled = false;
                btnSend.innerText = "ENVIAR PROVA E CONCLUIR";
            }
        }

        async function enviarJustificativa(tarefaId) {
            const motivo = document.getElementById(`motivo_${tarefaId}`).value;
            const fileInput = document.getElementById(`foto_${tarefaId}`);
            const file = fileInput.files[0];

            if(!motivo) { alert("Selecione um motivo!"); return; }
            if(!file) { alert("A foto é obrigatória para justificar!"); return; }

            const btnSend = document.getElementById(`btnSendJust_${tarefaId}`);
            btnSend.disabled = true;
            btnSend.innerText = "⏳ ENVIANDO FOTO...";

            try {
                const nomeArq = 'justificativa_' + Date.now() + '_' + Math.floor(Math.random()*1000) + '.jpg';
                const { error: errUp } = await sb.storage.from('PROVAS').upload(nomeArq, file);
                if(errUp) throw errUp;

                const { data: urlData } = sb.storage.from('PROVAS').getPublicUrl(nomeArq);
                const fotoUrl = urlData.publicUrl;

                btnSend.innerText = "💾 SALVANDO...";
                const dataHoje = new Date().toISOString().split('T')[0];

                const { error: errDb } = await sb.from('diario_execucoes_v2').insert({
                    tarefa_id: tarefaId,
                    funcionario_id: loggedUser.id,
                    data_execucao: dataHoje,
                    status: 'JUSTIFICADO',
                    motivo: motivo,
                    foto_url: fotoUrl
                });

                if(errDb) throw errDb;

                marcaCardComoConcluido(tarefaId, 'JUSTIFICADO');
                mostrarStatus('Justificativa salva com sucesso!');
                tarefasConcluidas++;
                atualizarProgresso();

            } catch(e) {
                alert("Erro: " + e.message);
                btnSend.disabled = false;
                btnSend.innerText = "ENVIAR JUSTIFICATIVA";
            }
        }

        function marcaCardComoConcluido(tarefaId, statusTexto) {
            const card = document.getElementById(`card_${tarefaId}`);
            if(!card) return;
            
            card.classList.add('task-done');
            
            const btnGroup = card.querySelector('.btn-group');
            if(btnGroup) btnGroup.remove();
            
            const execBox = card.querySelector('.execucao-box');
            if(execBox) execBox.remove();
            
            const justBox = card.querySelector('.justificativa-box');
            if(justBox) justBox.remove();
            
            card.innerHTML += `<span class="task-done-msg">✅ ${statusTexto}</span>`;
        }

        function mostrarStatus(msg) {
            const statusEl = document.getElementById('statusMsg');
            statusEl.innerText = msg;
            setTimeout(() => {
                statusEl.innerText = "";
            }, 3000);
        }

        // --- OCORRÊNCIAS EXTRAS ---
        function abrirModalOcorrencia() {
            document.getElementById('modalOcorrencia').style.display = 'flex';
        }

        function fecharModalOcorrencia() {
            document.getElementById('modalOcorrencia').style.display = 'none';
            document.getElementById('ocorrenciaCategoria').value = '';
            document.getElementById('ocorrenciaDescricao').value = '';
            document.getElementById('ocorrenciaFoto').value = '';
        }

        async function enviarOcorrencia() {
            const categoria = document.getElementById('ocorrenciaCategoria').value;
            const descricao = document.getElementById('ocorrenciaDescricao').value.trim();
            const fileInput = document.getElementById('ocorrenciaFoto');
            const file = fileInput.files[0];

            if(!categoria) { alert("Selecione uma categoria!"); return; }
            if(!descricao) { alert("Descreva a ocorrência!"); return; }
            if(!file) { alert("A foto é obrigatória!"); return; }

            const btnSend = document.getElementById('btnSendOcorrencia');
            btnSend.disabled = true;
            btnSend.innerText = "⏳ ENVIANDO FOTO...";

            try {
                // Upload Foto
                const nomeArq = 'ocorrencia_' + Date.now() + '_' + Math.floor(Math.random()*1000) + '.jpg';
                const { error: errUp } = await sb.storage.from('PROVAS').upload(nomeArq, file);
                if(errUp) throw errUp;

                const { data: urlData } = sb.storage.from('PROVAS').getPublicUrl(nomeArq);
                const fotoUrl = urlData.publicUrl;

                btnSend.innerText = "💾 SALVANDO...";

                // Banco de Dados
                const { error: errDb } = await sb.from('ocorrencias_internas_v2').insert({
                    funcionario_id: loggedUser.id,
                    categoria: categoria,
                    descricao: descricao,
                    foto_url: fotoUrl
                });

                if(errDb) throw errDb;

                alert('Ocorrência registrada com sucesso!');
                fecharModalOcorrencia();

            } catch(e) {
                alert("Erro: " + e.message);
            } finally {
                btnSend.disabled = false;
                btnSend.innerText = "ENVIAR REGISTRO";
            }
        }
    </script>
</body>
</html>
