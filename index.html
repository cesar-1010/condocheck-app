<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoCheck</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        // --- SUAS CREDENCIAIS ---
        const SUPABASE_URL = 'https://tkychwsoxinzcwzuuaas.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRreWNod3NveGluemN3enV1YWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDk4NjEsImV4cCI6MjA3ODc4NTg2MX0.4mq4_jcSyAhRybjhIMaWPjS8YIDMkgX9nF3JvQ-dUNg';
        const NUMERO_SINDICO = '5551982149914';

        // Inicializa o Cliente Supabase
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            // Estados da Aplicação
            const [areas, setAreas] = React.useState([]);
            const [tasks, setTasks] = React.useState([]);
            const [selectedArea, setSelectedArea] = React.useState('');
            const [checkedItems, setCheckedItems] = React.useState({});
            const [userName, setUserName] = React.useState('');
            const [notes, setNotes] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            
            // Estados da Foto
            const [photo, setPhoto] = React.useState(null);
            const fileInputRef = React.useRef(null);

            // 1. Carrega as Áreas do Banco ao abrir
            React.useEffect(() => {
                client.from('areas').select('*').then(({ data }) => {
                    if (data) setAreas(data);
                });
            }, []);

            // 2. Carrega as Tarefas quando a Área muda
            React.useEffect(() => {
                if (!selectedArea) { setTasks([]); return; }
                
                const areaObj = areas.find(a => a.nome === selectedArea);
                if (!areaObj) return;

                client.from('itens_check').select('tarefa').eq('area_id', areaObj.id)
                    .then(({ data }) => {
                        if (data) setTasks(data.map(t => t.tarefa));
                        setCheckedItems({});
                    });
            }, [selectedArea]);

            // Seleção de Foto
            const handlePhoto = (e) => {
                if (e.target.files[0]) setPhoto(e.target.files[0]);
            };

            // Função de Envio
            const enviar = async () => {
                if (!selectedArea || !userName) return alert('⚠️ Preencha seu nome e a área!');
                
                setLoading(true);
                let fotoUrl = null;

                try {
                    // --- UPLOAD DA FOTO (CORREÇÃO DE NOME) ---
                    if (photo) {
                        // Gera um nome aleatório para evitar erros de acentuação (Ex: 123456_aX9z.jpg)
                        const ext = photo.name.split('.').pop(); // Pega a extensão original (.jpg, .png)
                        const randomCode = Math.random().toString(36).substring(7); 
                        const fileName = `${Date.now()}_${randomCode}.${ext}`;
                        
                        const { error: uploadError } = await client.storage.from('PROVAS').upload(fileName, photo);
                        
                        if (uploadError) throw uploadError;
                        
                        // Pega o link público
                        const { data } = client.storage.from('PROVAS').getPublicUrl(fileName);
                        fotoUrl = data.publicUrl;
                    }

                    // --- SALVAR NO BANCO ---
                    const itens = Object.entries(checkedItems).filter(([k,v]) => v).map(([k]) => k);
                    
                    const { error: dbError } = await client.from('execucoes').insert([{
                        area_nome: selectedArea, 
                        user_name: userName, 
                        itens_concluidos: itens, 
                        obs: notes, 
                        foto_url: fotoUrl
                    }]);

                    if (dbError) throw dbError;

                    // --- WHATSAPP ---
                    const texto = `*CondoCheck* ✅\n` +
                                  `👤 *Quem:* ${userName}\n` +
                                  `📍 *Onde:* ${selectedArea}\n` + 
                                  (fotoUrl ? `📷 *Foto:* ${fotoUrl}\n` : '') + 
                                  `📝 *Obs:* ${notes}`;
                    
                    window.open(`https://wa.me/${NUMERO_SINDICO}?text=${encodeURIComponent(texto)}`, '_blank');
                    
                    // Limpar tela
                    alert('✅ Sucesso! Registro salvo.'); 
                    setCheckedItems({}); 
                    setNotes(''); 
                    setPhoto(null);

                } catch (e) {
                    alert('❌ Erro: ' + e.message);
                    console.error(e);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-6 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                        <h1 className="text-2xl font-bold mb-6 text-blue-600 flex items-center gap-2">
                            📋 CondoCheck
                        </h1>
                        
                        {/* Nome */}
                        <div className="mb-4">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Seu Nome</label>
                            <input className="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                                placeholder="Digite seu nome" 
                                value={userName} 
                                onChange={e => setUserName(e.target.value)} />
                        </div>
                        
                        {/* Área */}
                        <div className="mb-6">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Área</label>
                            <select className="w-full p-3 border rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none" 
                                value={selectedArea} 
                                onChange={e => setSelectedArea(e.target.value)}>
                                <option value="">Selecione...</option>
                                {areas.map(a => <option key={a.id} value={a.nome}>{a.nome}</option>)}
                            </select>
                        </div>

                        {/* Checklist */}
                        {selectedArea && (
                            <div className="animate-fade-in">
                                <h3 className="text-xs font-bold text-gray-400 mb-2 uppercase">Tarefas</h3>
                                <div className="space-y-3 mb-6">
                                    {tasks.map(t => (
                                        <label key={t} className="flex items-center gap-3 p-3 border rounded-lg hover:bg-blue-50 cursor-pointer transition">
                                            <input type="checkbox" className="w-5 h-5 text-blue-600" 
                                                onChange={() => setCheckedItems(p => ({...p, [t]: !p[t]}))} 
                                                checked={!!checkedItems[t]} />
                                            <span className="text-gray-700">{t}</span>
                                        </label>
                                    ))}
                                </div>
                                
                                {/* FOTO */}
                                <div className="mb-4">
                                    <div className={`w-full py-4 border-2 border-dashed rounded-lg text-center cursor-pointer transition 
                                        ${photo ? 'border-green-500 bg-green-50' : 'border-gray-300 hover:bg-gray-50'}`}
                                        onClick={() => fileInputRef.current.click()}>
                                        <p className={`font-bold ${photo ? 'text-green-600' : 'text-gray-500'}`}>
                                            {photo ? '✅ Foto Selecionada!' : '📷 Tirar Foto / Upload'}
                                        </p>
                                    </div>
                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handlePhoto} />
                                </div>
                                
                                <textarea className="w-full p-3 border rounded-lg mb-4 h-24" placeholder="Observações..." value={notes} onChange={e => setNotes(e.target.value)} />
                                
                                <button onClick={enviar} disabled={loading} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-md disabled:opacity-50">
                                    {loading ? 'Enviando...' : 'Finalizar e Enviar'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
